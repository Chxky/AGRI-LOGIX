name: agri_logix_farmer
description: Agri-Logix SeedTracker - Farmer Mobile App for Pfumvudza seed verification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  cloud_functions: ^6.3.0
  
  # QR Scanning
  mobile_scanner: ^3.5.5
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Location
  geolocator: ^10.1.0
  
  # Utilities
  path: ^1.9.0
  crypto: ^3.0.3
  connectivity_plus: ^5.0.2
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets: []
