name: agri_logix_farmer
description: Agri-Logix SeedTracker - Farmer Mobile App for Pfumvudza seed verification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_functions: ^4.5.0
  
  # QR Scanning
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.1
  fluttertoast: ^8.2.4
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets: []
